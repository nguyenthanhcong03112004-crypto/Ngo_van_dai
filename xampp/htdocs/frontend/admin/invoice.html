<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hóa đơn - ElectroHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Các tuỳ chỉnh riêng cho bản in PDF */
        @media print {
            body { -webkit-print-color-adjust: exact; print-color-adjust: exact; background-color: white; }
            .no-print { display: none !important; }
            .page-break { page-break-before: always; }
            @page { margin: 15mm; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 p-8 min-h-screen font-sans">
    <!-- Nút điều khiển, sẽ bị ẩn khi in (.no-print) -->
    <div class="max-w-4xl mx-auto mb-6 flex justify-between items-center no-print">
        <button id="btnSendEmail" onclick="sendInvoiceEmail()" class="px-6 py-2 bg-emerald-600 text-white rounded-lg hover:bg-emerald-700 font-bold flex items-center gap-2 transition-all shadow-md">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 13V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v12c0 1.1.9 2 2 2h8"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/><path d="M19 16v6"/><path d="M16 19h6"/></svg>
            Gửi Email Hóa Đơn
        </button>
        <div class="flex gap-4">
        <button onclick="window.close()" class="px-6 py-2 border border-slate-300 rounded-lg hover:bg-slate-50 font-bold text-slate-600 transition-all">
            Đóng
        </button>
        <button onclick="window.print()" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-bold flex items-center gap-2 transition-all shadow-md">
            Lưu PDF / In hóa đơn
        </button>
        </div>
    </div>

    <!-- Khung hóa đơn -->
    <div class="max-w-4xl mx-auto bg-white p-10 md:p-16 rounded-2xl shadow-sm border border-slate-200" id="invoiceContent">
        <div class="text-center py-10 text-slate-500">
            <svg class="animate-spin h-8 w-8 mx-auto mb-4 text-blue-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Đang tải dữ liệu hóa đơn...
        </div>
    </div>

    <script src="../js/helpers.js?v=3"></script>
    <script src="../js/auth.js?v=3"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');

            if (!id) {
                document.getElementById('invoiceContent').innerHTML = '<div class="text-center text-red-500 py-10 font-bold">Không tìm thấy mã đơn hàng.</div>';
                return;
            }

            try {
                const user = AuthManager.getUser();
                if (!user || !user.token) {
                    window.location.href = '../login.html';
                    return;
                }

                // Lấy chi tiết đơn hàng từ API (Bao gồm cả order_items)
                const response = await fetch(`${window.API_BASE}/api/admin/orders/${id}`, {
                    headers: { 'Authorization': `Bearer ${user.token}` }
                });
                const result = await response.json();

                if (response.ok) {
                    renderInvoice(result.data);
                    // Tự động mở hộp thoại in sau khi render xong (chờ 0.5s để ảnh/CSS tải xong)
                    setTimeout(() => window.print(), 500);
                } else {
                    document.getElementById('invoiceContent').innerHTML = `<div class="text-center text-red-500 py-10 font-bold">${result.message || 'Không thể tải hóa đơn.'}</div>`;
                }
            } catch (error) {
                document.getElementById('invoiceContent').innerHTML = '<div class="text-center text-red-500 py-10 font-bold">Lỗi kết nối máy chủ.</div>';
            }
        });

        function renderInvoice(order) {
            const dateStr = new Date(order.created_at).toLocaleDateString('vi-VN', {
                year: 'numeric', month: 'long', day: 'numeric',
                hour: '2-digit', minute: '2-digit'
            });

            const itemsHtml = order.items.map((item, index) => `
                <tr class="border-b border-slate-100">
                    <td class="py-4 text-center text-slate-500 font-medium">${index + 1}</td>
                    <td class="py-4">
                        <p class="font-bold text-slate-800">${item.product_name}</p>
                        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-0.5">SKU: PROD-${item.product_id}</p>
                    </td>
                    <td class="py-4 text-center font-bold text-slate-700">${item.quantity}</td>
                    <td class="py-4 text-right text-slate-600 font-medium">${formatVND(item.product_price)}</td>
                    <td class="py-4 text-right font-black text-slate-900">${formatVND(item.product_price * item.quantity)}</td>
                </tr>
            `).join('');

            // Generate VietQR Link (Mock Bank Info - can be customized in settings)
            const bankId = "MB";
            const accountNo = "0987654321";
            const accountName = "CONG TY ELECTROHUB";
            const qrUrl = `https://img.vietqr.io/image/${bankId}-${accountNo}-compact2.png?amount=${order.total_amount}&addInfo=THANH TOAN DON HANG ORD ${order.id}&accountName=${encodeURIComponent(accountName)}`;

            document.getElementById('invoiceContent').innerHTML = `
                <!-- Invoice Header -->
                <div class="flex justify-between items-start border-b-2 border-slate-900 pb-8 mb-8">
                    <div>
                        <div class="flex items-center gap-3 mb-4">
                            <div class="w-12 h-12 bg-slate-900 rounded-2xl flex items-center justify-center text-white font-black text-2xl shadow-xl shadow-slate-200">E</div>
                            <span class="text-3xl font-black text-slate-900 tracking-tighter uppercase">ElectroHub</span>
                        </div>
                        <div class="space-y-1">
                            <p class="text-xs font-black text-slate-400 uppercase tracking-widest">Từ:</p>
                            <p class="text-sm font-bold text-slate-800">CÔNG TY TNHH CÔNG NGHỆ ELECTROHUB</p>
                            <p class="text-sm text-slate-500 font-medium">123 Đường Công Nghệ, Quận IT, TP.HCM</p>
                            <p class="text-sm text-slate-500 font-medium">Hotline: 1900 6868 | Website: electrohub.vn</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <h1 class="text-5xl font-black text-slate-900 uppercase tracking-tighter mb-4 opacity-10">INVOICE</h1>
                        <div class="space-y-1">
                            <p class="text-sm font-black text-slate-900 uppercase tracking-widest">Mã đơn hàng:</p>
                            <p class="text-2xl font-black text-blue-600 tracking-tighter">#ORD-${order.id}</p>
                            <p class="text-sm text-slate-400 font-bold uppercase mt-2">Ngày lập: ${dateStr}</p>
                        </div>
                    </div>
                </div>

                <!-- Info Grid -->
                <div class="grid grid-cols-2 gap-12 mb-12">
                    <div>
                        <h3 class="text-xs font-black uppercase tracking-widest text-slate-400 mb-4 border-b border-slate-100 pb-2">Thông tin người mua</h3>
                        <div class="space-y-2">
                            <p class="text-xl font-black text-slate-900">${order.user_name || 'Khách hàng'}</p>
                            <div class="flex items-center gap-2 text-sm text-slate-600 font-bold">
                                <span class="bg-slate-100 px-2 py-0.5 rounded text-[10px] uppercase">SĐT</span>
                                <span>${order.user_phone || 'N/A'}</span>
                            </div>
                            <div class="flex items-center gap-2 text-sm text-slate-600 font-bold">
                                <span class="bg-slate-100 px-2 py-0.5 rounded text-[10px] uppercase">Email</span>
                                <span>${order.user_email || 'N/A'}</span>
                            </div>
                        </div>
                    </div>
                    <div>
                        <h3 class="text-xs font-black uppercase tracking-widest text-slate-400 mb-4 border-b border-slate-100 pb-2">Địa chỉ giao hàng</h3>
                        <p class="text-sm text-slate-700 font-bold leading-relaxed">${order.shipping_address || 'Nhận tại cửa hàng'}</p>
                        <p class="text-[10px] font-black text-blue-600 uppercase mt-2 tracking-widest">Vùng: ${order.shipping_region || 'Toàn quốc'}</p>
                    </div>
                </div>

                <!-- Order Items Table -->
                <div class="mb-12">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-900 text-white text-[10px] font-black uppercase tracking-[0.2em]">
                                <th class="py-4 px-6 rounded-l-2xl text-center w-16">STT</th>
                                <th class="py-4 px-6">Chi tiết sản phẩm</th>
                                <th class="py-4 px-6 text-center w-24">SL</th>
                                <th class="py-4 px-6 text-right w-36">Đơn giá</th>
                                <th class="py-4 px-6 rounded-r-2xl text-right w-48">Thành tiền</th>
                            </tr>
                        </thead>
                        <tbody class="text-sm">
                            ${itemsHtml}
                        </tbody>
                    </table>
                </div>

                <!-- Bottom Section: Summary & QR -->
                <div class="flex justify-between items-start pt-8 border-t-2 border-slate-100">
                    <!-- Payment QR -->
                    <div class="flex items-center gap-6 bg-slate-50 p-6 rounded-3xl border border-slate-100">
                        <div class="bg-white p-2 rounded-2xl shadow-sm border border-slate-200">
                            <img src="${qrUrl}" alt="Payment QR" class="w-32 h-32 object-contain">
                        </div>
                        <div>
                            <p class="text-xs font-black text-slate-400 uppercase tracking-widest mb-2">Quét mã thanh toán</p>
                            <p class="text-sm font-black text-slate-800 uppercase mb-1">VietQR - Chuyển khoản nhanh</p>
                            <p class="text-[10px] text-slate-500 font-bold max-w-[150px]">Vui lòng giữ nguyên nội dung chuyển khoản để đơn hàng được duyệt tự động.</p>
                        </div>
                    </div>

                    <!-- Totals -->
                    <div class="w-72 space-y-3">
                        <div class="flex justify-between text-slate-500 text-sm font-bold">
                            <span class="uppercase tracking-tighter">Tạm tính:</span>
                            <span>${formatVND(order.subtotal)}</span>
                        </div>
                        <div class="flex justify-between text-slate-500 text-sm font-bold">
                            <span class="uppercase tracking-tighter">Phí vận chuyển:</span>
                            <span>${formatVND(order.shipping_cost)}</span>
                        </div>
                        ${order.discount > 0 ? `
                        <div class="flex justify-between text-emerald-600 text-xs font-black italic">
                            <span class="uppercase tracking-tighter">Giảm giá mã Voucher:</span>
                            <span>-${formatVND(order.discount)}</span>
                        </div>` : ''}
                        <div class="pt-4 border-t-2 border-slate-900 flex justify-between items-center">
                            <span class="font-black text-slate-900 text-lg uppercase tracking-tighter">TỔNG CỘNG:</span>
                            <span class="text-3xl font-black text-blue-600 tracking-tighter font-mono">${formatVND(order.total_amount)}</span>
                        </div>
                        <div class="text-[10px] text-slate-400 text-right italic font-medium mt-2">
                            * Giá đã bao gồm thuế GTGT (VAT) theo quy định.
                        </div>
                    </div>
                </div>

                <!-- Footer Signatures -->
                <div class="grid grid-cols-2 gap-8 mt-20 text-center pb-20">
                    <div>
                        <p class="text-xs font-black text-slate-400 uppercase tracking-widest mb-16">Người mua hàng</p>
                        <p class="text-sm font-bold text-slate-800">${order.user_name || 'Ký tên'}</p>
                    </div>
                    <div>
                        <p class="text-xs font-black text-slate-400 uppercase tracking-widest mb-16">Người lập hóa đơn</p>
                        <div class="relative inline-block">
                             <p class="text-sm font-bold text-slate-800">ElectroHub Official</p>
                             <div class="absolute -top-12 -left-4 w-24 h-24 border-4 border-red-500/20 rounded-full flex items-center justify-center -rotate-12 pointer-events-none">
                                <span class="text-[8px] font-black text-red-500/40 uppercase">ElectroHub <br> Certified</span>
                             </div>
                        </div>
                    </div>
                </div>
            `;
        }

        async function sendInvoiceEmail() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            if (!id) return;

            const btn = document.getElementById('btnSendEmail');
            btn.innerHTML = '<svg class="animate-spin h-5 w-5 mr-2 text-white inline" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Đang gửi...';
            btn.disabled = true;

            try {
                const user = AuthManager.getUser();
                const response = await fetch(`${window.API_BASE}/api/admin/orders/${id}/send-invoice`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${user.token}` }
                });
                const result = await response.json();
                if (response.ok) { showToast(result.message, 'success'); } 
                else { showToast(result.message, 'error'); }
            } catch (err) {
                showToast('Lỗi mạng hoặc server không phản hồi.', 'error');
            } finally {
                btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-2 inline"><path d="M22 13V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v12c0 1.1.9 2 2 2h8"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/><path d="M19 16v6"/><path d="M16 19h6"/></svg> Gửi Email Hóa Đơn';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
