<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectroHub - Sản phẩm yêu thích</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 min-h-screen">

    <!-- HEADER -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between">
            <a href="../index.html" class="flex items-center gap-2 group">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white group-hover:rotate-12 transition-transform">
                    <i data-lucide="shopping-cart" size="24"></i>
                </div>
                <span class="text-2xl font-black text-slate-900 tracking-tighter">ElectroHub</span>
            </a>
            <nav class="hidden lg:flex items-center gap-8 text-sm font-bold">
                <a href="../index.html" class="text-slate-600 hover:text-blue-600 transition-colors">Trang chủ</a>
                <a href="../shop.html" class="text-slate-600 hover:text-blue-600 transition-colors">Cửa hàng</a>
                <a href="wishlist.html" class="text-blue-600">Yêu thích</a>
                <a href="orders.html" class="text-slate-600 hover:text-blue-600 transition-colors">Đơn hàng</a>
            </nav>
            <div class="flex items-center gap-4">
                <a href="wishlist.html" class="p-2 text-slate-600 hover:bg-slate-100 rounded-full relative transition-colors">
                    <i data-lucide="heart" size="22"></i>
                    <span class="wishlist-badge absolute top-1 right-1 w-4 h-4 bg-red-500 text-white text-[10px] flex items-center justify-center rounded-full font-bold" style="display: none;">0</span>
                </a>
                <a href="checkout.html" class="p-2 text-slate-600 hover:bg-slate-100 rounded-full relative transition-colors">
                    <i data-lucide="shopping-cart" size="22"></i>
                    <span class="cart-badge absolute top-1 right-1 w-4 h-4 bg-blue-600 text-white text-[10px] flex items-center justify-center rounded-full font-bold" style="display: none;">0</span>
                </a>
                
                <div class="h-6 w-px bg-slate-200 mx-2"></div>

                <div id="auth-header-container">
                    <a href="../login.html" class="flex items-center gap-2 px-5 py-2.5 bg-blue-600 text-white rounded-full font-bold hover:bg-blue-700 transition-all shadow-md shadow-blue-100">
                        <i data-lucide="user" size="18"></i> Đăng nhập
                    </a>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <div class="flex items-center gap-4 mb-10">
            <div class="p-3 bg-red-500 text-white rounded-2xl shadow-lg shadow-red-100">
                <i data-lucide="heart" size="28"></i>
            </div>
            <div>
                <h1 class="text-3xl font-black text-slate-900 tracking-tight">Sản phẩm yêu thích</h1>
                <p class="text-slate-500 font-medium">Danh sách các thiết bị bạn đã lưu</p>
            </div>
        </div>

        <!-- Wishlist Grid -->
        <div id="wishlist-items" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            <!-- Items will be rendered by wishlist.js -->
            <div class="p-12 text-center col-span-full">
                <div class="animate-pulse flex flex-col items-center gap-4">
                    <div class="w-12 h-12 bg-slate-100 rounded-full"></div>
                    <div class="h-4 w-48 bg-slate-100 rounded"></div>
                </div>
            </div>
        </div>

        <!-- Empty State (Hidden) -->
        <div class="hidden flex flex-col items-center justify-center py-24 text-center">
            <div class="w-24 h-24 bg-slate-100 text-slate-300 rounded-full flex items-center justify-center mb-6"><i data-lucide="heart" size="48"></i></div>
            <h2 class="text-2xl font-black text-slate-900 mb-2">Danh sách yêu thích trống</h2>
            <p class="text-slate-500 font-medium mb-8">Bạn chưa lưu sản phẩm nào vào danh sách yêu thích.</p>
            <a href="../shop.html" class="px-8 py-4 bg-blue-600 text-white font-bold rounded-2xl hover:bg-blue-700 transition-all shadow-xl shadow-blue-100">Khám phá ngay</a>
        </div>
    </main>

    <script src="../js/helpers.js?v=3"></script>
    <script src="../js/auth.js?v=3"></script>
    <script src="../js/cart.js?v=3"></script>
    <script src="../js/wishlist.js?v=3"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (window.lucide) {
                lucide.createIcons();
            }
        });
    </script>
</body>
</html>
