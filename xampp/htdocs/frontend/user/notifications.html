<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectroHub - Thông báo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../css/style.css">
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'], } } }
        }
    </script>
</head>
<body class="bg-slate-50 min-h-screen">

    <header class="bg-white border-b border-slate-200 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between">
            <a href="../index.html" class="flex items-center gap-2 group">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white group-hover:rotate-12 transition-transform">
                    <i data-lucide="shopping-cart" size="24"></i>
                </div>
                <span class="text-2xl font-black text-slate-900 tracking-tighter">ElectroHub</span>
            </a>
            <nav class="hidden lg:flex items-center gap-8 text-sm font-bold">
                <a href="../index.html" class="text-slate-600 hover:text-blue-600 transition-colors">Trang chủ</a>
                <a href="../shop.html" class="text-slate-600 hover:text-blue-600 transition-colors">Cửa hàng</a>
                <a href="profile.html" class="text-slate-600 hover:text-blue-600 transition-colors">Hồ sơ</a>
                <a href="orders.html" class="text-slate-600 hover:text-blue-600 transition-colors">Đơn hàng</a>
            </nav>
            <div class="flex items-center gap-4">
                <div id="auth-header-container"></div>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <div class="flex items-center justify-between mb-10">
            <div class="flex items-center gap-4">
                <div class="p-3 bg-blue-600 text-white rounded-2xl shadow-lg shadow-blue-100">
                    <i data-lucide="bell" size="28"></i>
                </div>
                <div>
                    <h1 class="text-3xl font-black text-slate-900 tracking-tight">Thông báo của bạn</h1>
                    <p class="text-slate-500 font-medium">Cập nhật đơn hàng và các tin tức mới nhất</p>
                </div>
            </div>
            <button onclick="markAllAsRead()" class="text-sm font-bold text-blue-600 hover:text-blue-700 hover:underline">
                Đánh dấu tất cả đã đọc
            </button>
        </div>

        <!-- Notification List -->
        <div id="notificationsContainer" class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden divide-y divide-slate-50">
            <div class="text-center py-10 text-slate-500"><i data-lucide="loader-2" class="animate-spin mx-auto mb-2"></i> Đang tải thông báo...</div>
        </div>
    </main>

    <script src="../js/helpers.js?v=3"></script>
    <script src="../js/auth.js?v=3"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if(window.lucide) lucide.createIcons();
            fetchNotifications();
        });

        async function fetchNotifications() {
            const user = AuthManager.getUser();
            if (!user || !user.token) {
                window.location.href = '../login.html';
                return;
            }

            const container = document.getElementById('notificationsContainer');
            try {
                const response = await fetch(`${window.API_BASE}/api/notifications`, {
                    headers: { 'Authorization': `Bearer ${user.token}` }
                });
                const result = await response.json();

                if (response.ok) {
                    const data = result.data;
                    if (!data || data.length === 0) {
                        container.innerHTML = `
                            <div class="text-center py-20">
                                <div class="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-4 text-slate-300">
                                    <i data-lucide="bell-off" size="32"></i>
                                </div>
                                <h3 class="text-lg font-bold text-slate-800">Bạn không có thông báo nào</h3>
                            </div>
                        `;
                        if(window.lucide) lucide.createIcons();
                        return;
                    }

                    container.innerHTML = data.map(n => {
                        const date = new Date(n.created_at).toLocaleString('vi-VN');
                        const bgClass = n.is_read ? 'bg-white' : 'bg-blue-50/50';
                        const iconColor = n.is_read ? 'text-slate-400' : 'text-blue-600';
                        
                        let icon = 'bell';
                        if(n.type === 'order') icon = 'package';
                        if(n.type === 'promotion') icon = 'tag';
                        if(n.type === 'warning') icon = 'alert-triangle';

                        return `
                            <div onclick="markAsRead(${n.id}, ${n.is_read})" class="p-6 flex gap-4 hover:bg-slate-50 transition-colors cursor-pointer ${bgClass}">
                                <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-sm border border-slate-100 shrink-0 ${iconColor}">
                                    <i data-lucide="${icon}" size="20"></i>
                                </div>
                                <div>
                                    <h3 class="font-bold ${n.is_read ? 'text-slate-700' : 'text-slate-900'}">${n.title}</h3>
                                    <p class="text-sm text-slate-500 mt-1 leading-relaxed">${n.message}</p>
                                    <p class="text-xs font-bold text-slate-400 mt-3 uppercase tracking-widest">${date}</p>
                                </div>
                            </div>
                        `;
                    }).join('');
                    if(window.lucide) lucide.createIcons();
                }
            } catch (error) {
                container.innerHTML = '<div class="text-center py-10 text-red-500">Lỗi kết nối máy chủ</div>';
            }
        }

        async function markAsRead(id, isRead) {
            if (isRead) return; // Không cần gọi API nếu đã đọc rồi
            const user = AuthManager.getUser();
            await fetch(`${window.API_BASE}/api/notifications/${id}/read`, {
                method: 'PUT',
                headers: { 'Authorization': `Bearer ${user.token}` }
            });
            fetchNotifications(); // Reload lại danh sách
        }

        async function markAllAsRead() {
            const user = AuthManager.getUser();
            const response = await fetch(`${window.API_BASE}/api/notifications/read-all`, {
                method: 'PUT',
                headers: { 'Authorization': `Bearer ${user.token}` }
            });
            if (response.ok) {
                fetchNotifications();
            }
        }
    </script>
</body>
</html>
