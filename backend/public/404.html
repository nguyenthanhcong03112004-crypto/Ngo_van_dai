<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Không tìm thấy trang</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">
    <div class="text-center bg-white p-10 rounded-[2.5rem] shadow-2xl shadow-slate-200 border border-slate-100 max-w-md w-full animate-fade-in">
        <div class="w-20 h-20 bg-slate-100 text-slate-400 rounded-full flex items-center justify-center mx-auto mb-6">
            <i data-lucide="file-question" size="40"></i>
        </div>
        <h1 class="text-4xl font-black text-slate-900 mb-2">404</h1>
        <p class="text-lg font-bold text-slate-700 mb-4">Trang không tồn tại</p>
        <p class="text-slate-500 font-medium mb-8">Xin lỗi, nội dung bạn đang tìm kiếm đã bị xóa hoặc không tồn tại.</p>
        <a href="/index.html" class="inline-flex items-center gap-2 px-6 py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition-all shadow-md">
            <i data-lucide="home" size="18"></i> Về trang chủ
        </a>
    </div>
    <script>if (window.lucide) lucide.createIcons();</script>
</body>
</html>
