<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectroHub - Hồ sơ người dùng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-slate-50 min-h-screen">
    <header class="bg-white border-b border-slate-200 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between">
            <a href="../index.html" class="flex items-center gap-2">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white"><i data-lucide="shopping-cart"></i></div>
                <span class="text-2xl font-black text-slate-900 tracking-tighter">ElectroHub</span>
            </a>
            <nav class="flex items-center gap-8 text-sm font-bold">
                <a href="../index.html" class="text-slate-600">Trang chủ</a>
                <a href="orders.html" class="text-slate-600">Đơn hàng của tôi</a>
            </nav>
        </div>
    </header>
    <main class="py-12 px-4 max-w-4xl mx-auto">
        <h1 class="text-3xl font-black text-slate-900 mb-8">Hồ sơ cá nhân</h1>
        
        <div class="bg-white p-8 md:p-12 rounded-[2.5rem] shadow-sm border border-slate-100 flex flex-col md:flex-row gap-12">
            <!-- Left: Avatar Section -->
            <div class="flex flex-col items-center gap-6 md:w-1/3">
                <div class="relative group">
                    <div class="w-40 h-40 rounded-full border-4 border-slate-50 overflow-hidden shadow-lg relative">
                        <img id="avatarPreview" src="https://picsum.photos/seed/default/200/200" alt="Avatar" class="w-full h-full object-cover">
                        <!-- Overlay & Upload Button -->
                        <div class="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center cursor-pointer" onclick="document.getElementById('avatarInput').click()">
                            <i data-lucide="camera" class="text-white" size="32"></i>
                        </div>
                    </div>
                    <input type="file" id="avatarInput" accept="image/png, image/jpeg, image/webp" class="hidden" onchange="handleAvatarUpload(this)">
                </div>
                <div class="text-center">
                    <p class="text-xs text-slate-400 font-medium">Định dạng JPEG, PNG, WEBP.<br>Dung lượng tối đa 5MB.</p>
                </div>
            </div>

            <!-- Right: Info Form -->
            <div class="flex-1">
                <form id="profileForm" class="space-y-6">
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-slate-600">Họ và Tên</label>
                        <div class="relative">
                            <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size="18"></i>
                            <input type="text" id="profileName" required class="w-full pl-12 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 font-medium transition-all">
                        </div>
                    </div>
                    
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-slate-600">Email (Không thể thay đổi)</label>
                        <div class="relative">
                            <i data-lucide="mail" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size="18"></i>
                            <input type="email" id="profileEmail" disabled class="w-full pl-12 pr-4 py-3 bg-slate-100 border border-slate-200 rounded-xl text-slate-500 font-medium cursor-not-allowed">
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="text-sm font-bold text-slate-600">Số điện thoại</label>
                        <div class="relative">
                            <i data-lucide="phone" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size="18"></i>
                            <input type="text" id="profilePhone" placeholder="Chưa cập nhật" class="w-full pl-12 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 font-medium transition-all">
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="text-sm font-bold text-slate-600">Địa chỉ giao hàng mặc định</label>
                        <div class="relative">
                            <i data-lucide="map-pin" class="absolute left-4 top-4 text-slate-400" size="18"></i>
                            <textarea id="profileAddress" rows="3" placeholder="Chưa cập nhật" class="w-full pl-12 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 font-medium transition-all"></textarea>
                        </div>
                    </div>

                    <div class="pt-4 flex justify-end">
                        <button type="submit" id="saveProfileBtn" class="px-8 py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition-all shadow-lg shadow-blue-100 flex items-center gap-2">
                            <i data-lucide="save" size="18"></i> Lưu thay đổi
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>
    <script src="../js/helpers.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            loadProfileData();
        });

        async function loadProfileData() {
            const user = AuthManager.getUser();
            if (!user || !user.token) return window.location.href = '../login.html';

            try {
                const response = await fetch('http://localhost:8888/api/user/profile', {
                    headers: { 'Authorization': `Bearer ${user.token}` }
                });
                const result = await response.json();
                if (response.ok) {
                    const data = result.data;
                    document.getElementById('profileName').value = data.name || '';
                    document.getElementById('profileEmail').value = data.email || '';
                    document.getElementById('profilePhone').value = data.phone || '';
                    document.getElementById('profileAddress').value = data.address || '';
                    if (data.avatar_url) {
                        document.getElementById('avatarPreview').src = `http://localhost:8888${data.avatar_url}`;
                    }
                }
            } catch (error) {
                showToast('Không thể tải thông tin hồ sơ', 'error');
            }
        }

        async function handleAvatarUpload(input) {
            const file = input.files[0];
            if (!file) return;
            
            const formData = new FormData();
            formData.append('avatar', file);
            const user = AuthManager.getUser();

            try {
                const response = await fetch('http://localhost:8888/api/user/avatar', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${user.token}` },
                    body: formData
                });
                const result = await response.json();
                if (response.ok) {
                    showToast('Đã cập nhật ảnh đại diện', 'success');
                    document.getElementById('avatarPreview').src = `http://localhost:8888${result.data.avatar_url}`;
                    // Cập nhật lại ảnh trên Navbar nếu cần
                    AuthManager.updateHeaderAuth();
                } else { showToast(result.message, 'error'); }
            } catch (error) { showToast('Lỗi khi tải ảnh lên', 'error'); }
        }

        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveProfileBtn');
            btn.innerText = 'Đang lưu...';
            
            const data = {
                name: document.getElementById('profileName').value,
                phone: document.getElementById('profilePhone').value,
                address: document.getElementById('profileAddress').value
            };
            
            try {
                const user = AuthManager.getUser();
                const response = await fetch('http://localhost:8888/api/user/profile', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${user.token}` },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                if (response.ok) {
                    showToast(result.message, 'success');
                    // Cập nhật lại user localStorage để navbar hiển thị tên mới
                    user.name = data.name;
                    localStorage.setItem('electrohub_user', JSON.stringify(user));
                    AuthManager.updateHeaderAuth();
                } else { showToast(result.message, 'error'); }
            } catch (error) { showToast('Lỗi khi lưu thông tin', 'error'); }
            finally { btn.innerHTML = '<i data-lucide="save" size="18"></i> Lưu thay đổi'; lucide.createIcons(); }
        });
    </script>
</body>
</html>
