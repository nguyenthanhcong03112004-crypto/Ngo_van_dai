<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectroHub - Cửa hàng</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
</head>
<body class="bg-white min-h-screen">

    <!-- HEADER -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-20">
                <a href="index.html" class="flex items-center gap-2 group">
                    <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white group-hover:rotate-12 transition-transform">
                        <i data-lucide="shopping-cart" size="24"></i>
                    </div>
                    <span class="text-2xl font-black text-slate-900 tracking-tighter">ElectroHub</span>
                </a>

                <div class="hidden md:flex flex-1 max-w-lg mx-8">
                    <div class="relative w-full">
                        <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size="20"></i>
                        <input type="text" placeholder="Tìm kiếm sản phẩm..." class="w-full pl-12 pr-4 py-2.5 bg-slate-100 border-transparent rounded-full outline-none focus:bg-white focus:ring-2 focus:ring-blue-500 transition-all text-sm">
                    </div>
                </div>

                <nav class="hidden lg:flex items-center gap-8 text-sm font-bold">
                    <a href="index.html" class="text-slate-600 hover:text-blue-600 transition-colors">Trang chủ</a>
                    <a href="shop.html" class="text-blue-600">Cửa hàng</a>
                    <a href="#" class="text-slate-600 hover:text-blue-600 transition-colors">Khuyến mãi</a>
                </nav>

                <div class="flex items-center gap-4">
                    <a href="user/wishlist.html" class="p-2 text-slate-600 hover:bg-slate-100 rounded-full relative transition-colors">
                        <i data-lucide="heart" size="22"></i>
                    </a>
                    <a href="user/checkout.html" class="p-2 text-slate-600 hover:bg-slate-100 rounded-full relative transition-colors">
                        <i data-lucide="shopping-cart" size="22"></i>
                        <span class="absolute top-1 right-1 w-4 h-4 bg-blue-600 text-white text-[10px] flex items-center justify-center rounded-full font-bold">2</span>
                    </a>
                    <a href="login.html" class="flex items-center gap-2 px-5 py-2.5 bg-blue-600 text-white rounded-full font-bold hover:bg-blue-700 transition-all shadow-md shadow-blue-100">
                        <i data-lucide="user" size="18"></i> Đăng nhập
                    </a>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <div class="flex flex-col lg:flex-row gap-12">
            
            <!-- SIDEBAR FILTERS -->
            <aside class="w-full lg:w-72 space-y-10 shrink-0">
                <div>
                    <h3 class="text-lg font-black text-slate-900 mb-6 uppercase tracking-wider">Danh mục</h3>
                    <div class="space-y-3">
                        <label class="flex items-center gap-3 cursor-pointer group">
                            <input type="checkbox" class="w-5 h-5 rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                            <span class="text-slate-600 font-medium group-hover:text-blue-600 transition-colors">Điện thoại</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer group">
                            <input type="checkbox" class="w-5 h-5 rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                            <span class="text-slate-600 font-medium group-hover:text-blue-600 transition-colors">Laptop</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer group">
                            <input type="checkbox" class="w-5 h-5 rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                            <span class="text-slate-600 font-medium group-hover:text-blue-600 transition-colors">Máy tính bảng</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer group">
                            <input type="checkbox" class="w-5 h-5 rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                            <span class="text-slate-600 font-medium group-hover:text-blue-600 transition-colors">Phụ kiện</span>
                        </label>
                    </div>
                </div>

                <div>
                    <h3 class="text-lg font-black text-slate-900 mb-6 uppercase tracking-wider">Khoảng giá</h3>
                    <div class="space-y-4">
                        <input type="range" min="0" max="100" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
                        <div class="flex items-center justify-between text-sm font-bold text-slate-600">
                            <span>0 ₫</span>
                            <span>100tr ₫</span>
                        </div>
                    </div>
                </div>

                <div>
                    <h3 class="text-lg font-black text-slate-900 mb-6 uppercase tracking-wider">Thương hiệu</h3>
                    <div class="grid grid-cols-2 gap-3">
                        <button class="px-4 py-2 border border-slate-200 rounded-xl text-sm font-bold text-slate-600 hover:border-blue-600 hover:text-blue-600 transition-all">Apple</button>
                        <button class="px-4 py-2 border border-slate-200 rounded-xl text-sm font-bold text-slate-600 hover:border-blue-600 hover:text-blue-600 transition-all">Samsung</button>
                        <button class="px-4 py-2 border border-slate-200 rounded-xl text-sm font-bold text-slate-600 hover:border-blue-600 hover:text-blue-600 transition-all">Dell</button>
                        <button class="px-4 py-2 border border-slate-200 rounded-xl text-sm font-bold text-slate-600 hover:border-blue-600 hover:text-blue-600 transition-all">Asus</button>
                    </div>
                </div>
            </aside>

            <!-- PRODUCT LISTING -->
            <div class="flex-1">
                <!-- Toolbar -->
                <div class="flex flex-col sm:flex-row items-center justify-between gap-4 mb-10 bg-slate-50 p-4 rounded-2xl border border-slate-100">
                    <p class="text-slate-500 font-medium">Hiển thị <span class="text-slate-900 font-bold">12</span> trên <span class="text-slate-900 font-bold">48</span> sản phẩm</p>
                    <div class="flex items-center gap-4">
                        <span class="text-sm font-bold text-slate-600 whitespace-nowrap">Sắp xếp theo:</span>
                        <select class="bg-white border border-slate-200 rounded-xl px-4 py-2 text-sm font-bold outline-none focus:ring-2 focus:ring-blue-500">
                            <option>Mới nhất</option>
                            <option>Giá thấp đến cao</option>
                            <option>Giá cao đến thấp</option>
                            <option>Bán chạy nhất</option>
                        </select>
                    </div>
                </div>

                <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-8">
                    <!-- Products will be dynamically loaded here by JS -->
                    <div class="col-span-full py-12 text-center text-slate-500">
                        <i data-lucide="loader-2" class="animate-spin mx-auto mb-2" size="24"></i> Đang tải sản phẩm...
                    </div>
                </div>

                <!-- Pagination -->
                <div class="mt-16 flex items-center justify-center gap-2">
                    <button class="w-12 h-12 flex items-center justify-center rounded-xl border border-slate-200 text-slate-400 hover:bg-slate-100 transition-all">
                        <i data-lucide="chevron-left" size="20"></i>
                    </button>
                    <button class="w-12 h-12 flex items-center justify-center rounded-xl bg-blue-600 text-white font-bold shadow-lg shadow-blue-100">1</button>
                    <button class="w-12 h-12 flex items-center justify-center rounded-xl border border-slate-200 text-slate-600 font-bold hover:bg-slate-100 transition-all">2</button>
                    <button class="w-12 h-12 flex items-center justify-center rounded-xl border border-slate-200 text-slate-600 font-bold hover:bg-slate-100 transition-all">3</button>
                    <button class="w-12 h-12 flex items-center justify-center rounded-xl border border-slate-200 text-slate-400 hover:bg-slate-100 transition-all">
                        <i data-lucide="chevron-right" size="20"></i>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-slate-900 text-slate-400 py-12 mt-24">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <p class="text-sm">&copy; 2026 ElectroHub. Tất cả quyền được bảo lưu.</p>
        </div>
    </footer>

    <script src="js/helpers.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            fetchProducts();
        });

        async function fetchProducts() {
            try {
                const response = await fetch('http://localhost:8888/api/user/products?limit=12');
                const result = await response.json();
                if (response.ok) {
                    renderProducts(result.data.products || result.data);
                }
            } catch (e) {
                document.getElementById('productGrid').innerHTML = '<div class="col-span-full py-12 text-center text-red-500">Lỗi tải dữ liệu sản phẩm.</div>';
            }
        }

        function renderProducts(products) {
            const grid = document.getElementById('productGrid');
            if (!products || products.length === 0) {
                grid.innerHTML = '<div class="col-span-full py-12 text-center text-slate-500">Không có sản phẩm nào.</div>';
                return;
            }

            grid.innerHTML = products.map(p => {
                const rating = Number(p.average_rating || 0).toFixed(1);
                return `
                <div class="group bg-white rounded-3xl border border-slate-100 overflow-hidden hover:shadow-2xl hover:shadow-slate-200 transition-all duration-500 flex flex-col relative">
                    <div class="relative aspect-[4/3] overflow-hidden">
                        <img src="${p.image_url || 'https://picsum.photos/seed/phone1/800/600'}" alt="${p.name}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                        <div class="absolute top-4 right-4 flex flex-col gap-2">
                            <div class="bg-white/90 backdrop-blur-md px-2 py-1 rounded-lg flex items-center gap-1 shadow-sm">
                                <i data-lucide="star" size="14" class="text-yellow-500 fill-yellow-500"></i>
                                <span class="text-xs font-bold text-slate-800">${rating}</span>
                            </div>
                            <button onclick="WishlistManager.toggleWishlist({id: '${p.id}', name: '${p.name}', price: ${p.price}, image: '${p.image_url}', category: '${p.category_name}'})" class="p-2 rounded-xl backdrop-blur-md shadow-lg transition-all bg-white/90 text-slate-400 hover:text-red-500">
                                <i data-lucide="heart" size="18"></i>
                            </button>
                        </div>
                    </div>
                    <div class="p-6 flex-1 flex flex-col">
                        <div class="text-xs font-bold text-blue-600 uppercase tracking-widest mb-2">${p.category_name || 'Sản phẩm'}</div>
                        <a href="product-detail.html?id=${p.id}" class="block"><h3 class="font-bold text-slate-800 mb-2 group-hover:text-blue-600 transition-colors line-clamp-1">${p.name}</h3></a>
                        <div class="flex items-center gap-1 mb-4">
                            <span class="text-xs text-slate-500">(${p.review_count || 0} đánh giá)</span>
                        </div>
                        <div class="flex items-center justify-between mt-auto">
                            <span class="text-lg font-black text-slate-900">${formatVND(p.price)}</span>
                            <button onclick="CartManager.addToCart({id: '${p.id}', name: '${p.name}', price: ${p.price}, image: '${p.image_url}'}, this)" class="w-10 h-10 flex items-center justify-center bg-slate-100 text-slate-600 rounded-xl hover:bg-blue-600 hover:text-white transition-all">
                                <i data-lucide="shopping-cart" size="18"></i>
                            </button>
                        </div>
                    </div>
                </div>
                `;
            }).join('');
            if (window.lucide) lucide.createIcons();
        }
    </script>
</body>
</html>
