<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectroHub - Khôi phục mật khẩu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/style.css">
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'], } } }
        }
    </script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-white rounded-[2.5rem] shadow-2xl shadow-slate-200 border border-slate-100 overflow-hidden relative">
        <div class="p-10 pb-6 text-center">
            <a href="index.html" class="inline-flex items-center gap-2 mb-8 group">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white group-hover:rotate-12 transition-transform">
                    <i data-lucide="shield-alert" size="24"></i>
                </div>
                <span class="text-2xl font-black text-slate-900 tracking-tighter">ElectroHub</span>
            </a>
            
            <!-- PHẦN 1: NHẬP EMAIL QUÊN MẬT KHẨU -->
            <div id="forgotFormSection" class="hidden animate-fade-in">
                <h1 class="text-2xl font-black text-slate-900 tracking-tight">Quên mật khẩu?</h1>
                <p class="text-slate-500 font-medium mt-2 mb-8">Nhập email của bạn, chúng tôi sẽ gửi liên kết để đặt lại mật khẩu.</p>
                
                <form id="forgotForm" class="space-y-6 text-left">
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-slate-600">Email đã đăng ký</label>
                        <div class="relative">
                            <i data-lucide="mail" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size="18"></i>
                            <input type="email" id="forgotEmail" required placeholder="example@email.com" class="w-full pl-12 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 font-medium transition-all">
                        </div>
                    </div>
                    <button type="submit" id="btnForgot" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black text-lg shadow-xl shadow-blue-100 hover:bg-blue-700 transition-all transform active:scale-95">
                        Gửi liên kết khôi phục
                    </button>
                </form>
                <p class="mt-8 text-sm font-bold text-slate-500">
                    Nhớ mật khẩu? <a href="login.html" class="text-blue-600 hover:underline">Đăng nhập</a>
                </p>
            </div>

            <!-- PHẦN 2: ĐẶT LẠI MẬT KHẨU MỚI (Khi có Token) -->
            <div id="resetFormSection" class="hidden animate-fade-in">
                <h1 class="text-2xl font-black text-slate-900 tracking-tight">Đặt mật khẩu mới</h1>
                <p class="text-slate-500 font-medium mt-2 mb-8">Vui lòng nhập mật khẩu mới có ít nhất 6 ký tự.</p>
                
                <form id="resetForm" class="space-y-6 text-left">
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-slate-600">Mật khẩu mới</label>
                        <div class="relative">
                            <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size="18"></i>
                            <input type="password" id="newPassword" required minlength="6" placeholder="••••••••" class="w-full pl-12 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 font-medium transition-all">
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-slate-600">Xác nhận mật khẩu mới</label>
                        <div class="relative">
                            <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size="18"></i>
                            <input type="password" id="confirmPassword" required minlength="6" placeholder="••••••••" class="w-full pl-12 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 font-medium transition-all">
                        </div>
                    </div>
                    <button type="submit" id="btnReset" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black text-lg shadow-xl shadow-blue-100 hover:bg-blue-700 transition-all transform active:scale-95">
                        Cập nhật mật khẩu
                    </button>
                </form>
            </div>

        </div>
    </div>

    <script src="js/helpers.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (window.lucide) lucide.createIcons();

            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            // Routing view dựa theo có token hay không
            if (token) {
                document.getElementById('resetFormSection').classList.remove('hidden');
            } else {
                document.getElementById('forgotFormSection').classList.remove('hidden');
            }

            // Xử lý gửi Email lấy link khôi phục
            document.getElementById('forgotForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('forgotEmail').value;
                const btn = document.getElementById('btnForgot');
                btn.innerText = "Đang gửi..."; btn.disabled = true;

                try {
                    const response = await fetch('http://localhost:8888/api/auth/forgot-password', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email })
                    });
                    const result = await response.json();
                    
                    if (response.ok) {
                        showToast(result.message, 'success');
                        document.getElementById('forgotForm').reset();
                    } else { throw new Error(result.message); }
                } catch (err) {
                    showToast(err.message || "Lỗi kết nối", 'error');
                } finally {
                    btn.innerText = "Gửi liên kết khôi phục"; btn.disabled = false;
                }
            });

            // Xử lý đặt lại mật khẩu mới
            const resetForm = document.getElementById('resetForm');
            if (resetForm) {
                resetForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const newPassword = document.getElementById('newPassword').value;
                    const confirmPassword = document.getElementById('confirmPassword').value;
                    
                    if (newPassword !== confirmPassword) {
                        return showToast('Mật khẩu xác nhận không khớp.', 'error');
                    }

                    const btn = document.getElementById('btnReset');
                    btn.innerText = "Đang xử lý..."; btn.disabled = true;

                    try {
                        const response = await fetch('http://localhost:8888/api/auth/reset-password', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ token, new_password: newPassword })
                        });
                        const result = await response.json();
                        
                        if (response.ok) {
                            showToast(result.message, 'success');
                            setTimeout(() => window.location.href = 'login.html', 2000);
                        } else { throw new Error(result.message); }
                    } catch (err) {
                        showToast(err.message || "Lỗi xử lý. Token có thể đã hết hạn.", 'error');
                        btn.innerText = "Cập nhật mật khẩu"; btn.disabled = false;
                    }
                });
            }
        });
    </script>
</body>
</html>
