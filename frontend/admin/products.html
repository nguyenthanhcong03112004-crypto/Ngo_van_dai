<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectroHub Admin - Quản lý sản phẩm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-slate-50 min-h-screen flex">
    <aside class="w-72 bg-white border-r border-slate-200 h-screen sticky top-0 flex flex-col">
        <div class="p-8 flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white"><i data-lucide="layout-dashboard"></i></div>
            <span class="text-2xl font-black text-slate-900 tracking-tighter">AdminHub</span>
        </div>
        <nav class="flex-1 px-4 space-y-2">
            <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 text-slate-500 hover:bg-slate-50 hover:text-slate-900 rounded-xl font-bold transition-all"><i data-lucide="bar-chart-3" size="20"></i> Tổng quan</a>
            <a href="products.html" class="flex items-center gap-3 px-4 py-3 bg-blue-50 text-blue-600 rounded-xl font-bold transition-all"><i data-lucide="package" size="20"></i> Sản phẩm</a>
            <a href="orders.html" class="flex items-center gap-3 px-4 py-3 text-slate-500 hover:bg-slate-50 hover:text-slate-900 rounded-xl font-bold transition-all"><i data-lucide="shopping-bag" size="20"></i> Đơn hàng</a>
            <a href="customers.html" class="flex items-center gap-3 px-4 py-3 text-slate-500 hover:bg-slate-50 hover:text-slate-900 rounded-xl font-bold transition-all"><i data-lucide="users" size="20"></i> Khách hàng</a>
        </nav>
        <div class="p-6 border-t border-slate-100"><a href="../index.html" class="w-full flex items-center gap-3 px-4 py-3 text-red-500 hover:bg-red-50 rounded-xl font-bold transition-all"><i data-lucide="log-out" size="20"></i> Thoát Admin</a></div>
    </aside>
    <main class="flex-1 p-10 overflow-auto">
        <!-- HEADER -->
        <header class="flex items-center justify-between mb-10">
            <div>
                <h1 class="text-3xl font-black text-slate-900 tracking-tight">Quản lý sản phẩm</h1>
                <p class="text-slate-500 font-medium">Thêm, sửa, xóa và cập nhật sản phẩm</p>
            </div>
            <button onclick="openProductModal()" class="flex items-center gap-2 px-5 py-2.5 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition-all shadow-md shadow-blue-100">
                <i data-lucide="plus" size="18"></i> Thêm sản phẩm
            </button>
        </header>

        <!-- PRODUCTS TABLE -->
        <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-slate-50/50">
                            <th class="px-8 py-4 text-xs font-bold text-slate-400 uppercase tracking-wider">Sản phẩm</th>
                            <th class="px-8 py-4 text-xs font-bold text-slate-400 uppercase tracking-wider">Danh mục</th>
                            <th class="px-8 py-4 text-xs font-bold text-slate-400 uppercase tracking-wider">Giá</th>
                            <th class="px-8 py-4 text-xs font-bold text-slate-400 uppercase tracking-wider">Tồn kho</th>
                            <th class="px-8 py-4 text-xs font-bold text-slate-400 uppercase tracking-wider">Trạng thái</th>
                            <th class="px-8 py-4 text-xs font-bold text-slate-400 uppercase tracking-wider text-right">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-50" id="productTableBody">
                        <!-- Products will be rendered here -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- ADD/EDIT PRODUCT MODAL -->
    <div id="productModal" class="fixed inset-0 z-[60] hidden flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
        <div class="bg-white w-full max-w-2xl rounded-[2.5rem] shadow-2xl overflow-hidden relative">
            <form id="productForm" class="flex flex-col h-[90vh]">
                <input type="hidden" id="productId">
                <!-- Modal Header -->
                <div class="p-8 pb-4">
                    <button type="button" onclick="closeProductModal()" class="absolute top-6 right-6 p-2 hover:bg-slate-100 rounded-full transition-all">
                        <i data-lucide="x" size="24"></i>
                    </button>
                    <h2 id="modalTitle" class="text-2xl font-black text-slate-900 mb-2">Thêm sản phẩm mới</h2>
                    <p class="text-slate-500 font-medium">Điền thông tin chi tiết của sản phẩm.</p>
                </div>
                <!-- Modal Body -->
                <div class="flex-1 p-8 pt-4 overflow-y-auto space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label for="productName" class="text-sm font-bold text-slate-600">Tên sản phẩm</label>
                            <input type="text" id="productName" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 font-medium">
                        </div>
                        <div class="space-y-2">
                            <label for="productCategory" class="text-sm font-bold text-slate-600">Danh mục</label>
                            <select id="productCategory" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 font-medium appearance-none">
                                <!-- Categories will be loaded here -->
                            </select>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label for="productDescription" class="text-sm font-bold text-slate-600">Mô tả</label>
                        <textarea id="productDescription" rows="4" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 font-medium"></textarea>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label for="productPrice" class="text-sm font-bold text-slate-600">Giá (VND)</label>
                            <input type="number" id="productPrice" required min="0" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 font-medium">
                        </div>
                        <div class="space-y-2">
                            <label for="productStock" class="text-sm font-bold text-slate-600">Số lượng tồn kho</label>
                            <input type="number" id="productStock" required min="0" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 font-medium">
                        </div>
                    </div>
                     <div class="space-y-2">
                        <label for="productImage" class="text-sm font-bold text-slate-600">URL Hình ảnh</label>
                        <input type="text" id="productImage" placeholder="https://example.com/image.jpg" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 font-medium">
                    </div>
                </div>
                <!-- Modal Footer -->
                <div class="p-8 pt-4 bg-slate-50 border-t border-slate-100 flex justify-end gap-4">
                    <button type="button" onclick="closeProductModal()" class="px-6 py-3 bg-white border border-slate-200 text-slate-600 rounded-xl font-bold text-sm hover:bg-slate-100 transition-all">Hủy</button>
                    <button type="submit" class="px-6 py-3 bg-blue-600 text-white rounded-xl font-bold text-sm hover:bg-blue-700 transition-all shadow-lg shadow-blue-100">Lưu sản phẩm</button>
                </div>
            </form>
        </div>
    </main>
    <script src="../js/helpers.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (window.lucide) lucide.createIcons();
            fetchProducts();
        });

        const API_URL = 'http://localhost:8888/api/admin/products';
        const user = AuthManager.getUser();

        async function fetchProducts() {
            try {
                const response = await fetch(API_URL, {
                    headers: { 'Authorization': `Bearer ${user.token}` }
                });
                const result = await response.json();
                if (response.ok) {
                    renderProductTable(result.data.products || result.data);
                } else {
                    showToast('Không thể tải danh sách sản phẩm', 'error');
                }
            } catch (error) {
                showToast('Lỗi kết nối đến server', 'error');
            }
        }

        function renderProductTable(products) {
            const tableBody = document.getElementById('productTableBody');
            if (products.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="6" class="text-center p-12 text-slate-500">Chưa có sản phẩm nào.</td></tr>`;
                return;
            }
            tableBody.innerHTML = products.map(p => `
                <tr class="hover:bg-slate-50/50 transition-colors">
                    <td class="px-8 py-6">
                        <div class="flex items-center gap-4">
                            <img src="${p.image_url || 'https://picsum.photos/seed/default/100'}" class="w-14 h-14 rounded-lg object-cover border border-slate-100">
                            <div>
                                <p class="font-bold text-slate-800">${p.name}</p>
                                <p class="text-xs text-slate-500 font-medium">ID: ${p.id}</p>
                            </div>
                        </div>
                    </td>
                    <td class="px-8 py-6 text-slate-500 font-medium">${p.category_name || 'N/A'}</td>
                    <td class="px-8 py-6 font-bold text-slate-900">${formatVND(p.price)}</td>
                    <td class="px-8 py-6 font-medium text-slate-600">${p.stock}</td>
                    <td class="px-8 py-6">
                        ${p.is_active ? '<span class="px-3 py-1 bg-green-100 text-green-600 rounded-full text-[10px] font-bold uppercase tracking-wider">Đang bán</span>' : '<span class="px-3 py-1 bg-slate-100 text-slate-600 rounded-full text-[10px] font-bold uppercase tracking-wider">Đã ẩn</span>'}
                    </td>
                    <td class="px-8 py-6 text-right">
                        <div class="flex justify-end gap-2">
                            <button onclick='openProductModal(${JSON.stringify(p)})' class="p-2 text-slate-400 hover:text-blue-600 transition-all" title="Sửa"><i data-lucide="edit" size="18"></i></button>
                            <button onclick="deleteProduct(${p.id})" class="p-2 text-slate-400 hover:text-red-600 transition-all" title="Xóa"><i data-lucide="trash-2" size="18"></i></button>
                        </div>
                    </td>
                </tr>
            `).join('');
            if (window.lucide) lucide.createIcons();
        }

        function openProductModal(product = null) {
            const modal = document.getElementById('productModal');
            const form = document.getElementById('productForm');
            const title = document.getElementById('modalTitle');
            form.reset();
            document.getElementById('productId').value = '';

            if (product) {
                title.innerText = 'Chỉnh sửa sản phẩm';
                document.getElementById('productId').value = product.id;
                document.getElementById('productName').value = product.name;
                document.getElementById('productDescription').value = product.description || '';
                document.getElementById('productPrice').value = product.price;
                document.getElementById('productStock').value = product.stock;
                document.getElementById('productImage').value = product.image_url || '';
                // Set category later after fetching
            } else {
                title.innerText = 'Thêm sản phẩm mới';
            }
            
            // Fetch categories and populate dropdown
            // For now, using mock data. In a real app, fetch from /api/admin/categories
            const categorySelect = document.getElementById('productCategory');
            const mockCategories = [{id: 1, name: 'Điện thoại'}, {id: 2, name: 'Tai nghe'}, {id: 3, name: 'Laptop'}, {id: 4, name: 'Phụ kiện'}];
            categorySelect.innerHTML = mockCategories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            if (product) {
                categorySelect.value = product.category_id;
            }

            modal.classList.remove('hidden');
        }

        function closeProductModal() {
            document.getElementById('productModal').classList.add('hidden');
        }

        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('productId').value;
            const isEditing = !!id;

            const data = {
                name: document.getElementById('productName').value,
                category_id: parseInt(document.getElementById('productCategory').value),
                description: document.getElementById('productDescription').value,
                price: parseInt(document.getElementById('productPrice').value),
                stock: parseInt(document.getElementById('productStock').value),
                image_url: document.getElementById('productImage').value,
            };

            const url = isEditing ? `${API_URL}/${id}` : API_URL;
            const method = isEditing ? 'PUT' : 'POST';

            try {
                const response = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${user.token}` },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                if (response.ok) {
                    showToast(result.message, 'success');
                    closeProductModal();
                    fetchProducts();
                } else {
                    throw new Error(result.message);
                }
            } catch (error) {
                showToast(error.message, 'error');
            }
        });

        async function deleteProduct(id) {
            if (!confirm('Bạn có chắc chắn muốn xóa sản phẩm này không?')) return;
            try {
                const response = await fetch(`${API_URL}/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${user.token}` }
                });
                const result = await response.json();
                if (response.ok) {
                    showToast(result.message, 'success');
                    fetchProducts();
                } else {
                    throw new Error(result.message);
                }
            } catch (error) {
                showToast(error.message, 'error');
            }
        }
    </script>
</body>
</html>
