<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hóa đơn - ElectroHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Các tuỳ chỉnh riêng cho bản in PDF */
        @media print {
            body { -webkit-print-color-adjust: exact; print-color-adjust: exact; background-color: white; }
            .no-print { display: none !important; }
            .page-break { page-break-before: always; }
            @page { margin: 15mm; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 p-8 min-h-screen font-sans">
    <!-- Nút điều khiển, sẽ bị ẩn khi in (.no-print) -->
    <div class="max-w-4xl mx-auto mb-6 flex justify-between items-center no-print">
        <button id="btnSendEmail" onclick="sendInvoiceEmail()" class="px-6 py-2 bg-emerald-600 text-white rounded-lg hover:bg-emerald-700 font-bold flex items-center gap-2 transition-all shadow-md">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 13V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v12c0 1.1.9 2 2 2h8"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/><path d="M19 16v6"/><path d="M16 19h6"/></svg>
            Gửi Email Hóa Đơn
        </button>
        <div class="flex gap-4">
        <button onclick="window.close()" class="px-6 py-2 border border-slate-300 rounded-lg hover:bg-slate-50 font-bold text-slate-600 transition-all">
            Đóng
        </button>
        <button onclick="window.print()" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-bold flex items-center gap-2 transition-all shadow-md">
            Lưu PDF / In hóa đơn
        </button>
        </div>
    </div>

    <!-- Khung hóa đơn -->
    <div class="max-w-4xl mx-auto bg-white p-10 md:p-16 rounded-2xl shadow-sm border border-slate-200" id="invoiceContent">
        <div class="text-center py-10 text-slate-500">
            <svg class="animate-spin h-8 w-8 mx-auto mb-4 text-blue-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Đang tải dữ liệu hóa đơn...
        </div>
    </div>

    <script src="../js/helpers.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');

            if (!id) {
                document.getElementById('invoiceContent').innerHTML = '<div class="text-center text-red-500 py-10 font-bold">Không tìm thấy mã đơn hàng.</div>';
                return;
            }

            try {
                const user = AuthManager.getUser();
                if (!user || !user.token) {
                    window.location.href = '../login.html';
                    return;
                }

                // Lấy chi tiết đơn hàng từ API (Bao gồm cả order_items)
                const response = await fetch(`http://localhost:8888/api/admin/orders/${id}`, {
                    headers: { 'Authorization': `Bearer ${user.token}` }
                });
                const result = await response.json();

                if (response.ok) {
                    renderInvoice(result.data);
                    // Tự động mở hộp thoại in sau khi render xong (chờ 0.5s để ảnh/CSS tải xong)
                    setTimeout(() => window.print(), 500);
                } else {
                    document.getElementById('invoiceContent').innerHTML = `<div class="text-center text-red-500 py-10 font-bold">${result.message || 'Không thể tải hóa đơn.'}</div>`;
                }
            } catch (error) {
                document.getElementById('invoiceContent').innerHTML = '<div class="text-center text-red-500 py-10 font-bold">Lỗi kết nối máy chủ.</div>';
            }
        });

        function renderInvoice(order) {
            const date = new Date(order.created_at).toLocaleString('vi-VN');
            const itemsHtml = order.items.map((item, index) => `
                <tr class="border-b border-slate-100">
                    <td class="py-4 text-center text-slate-500">${index + 1}</td>
                    <td class="py-4 font-bold text-slate-800">${item.product_name}</td>
                    <td class="py-4 text-center">${item.quantity}</td>
                    <td class="py-4 text-right text-slate-600">${formatVND(item.product_price)}</td>
                    <td class="py-4 text-right font-bold text-slate-900">${formatVND(item.product_price * item.quantity)}</td>
                </tr>
            `).join('');

            document.getElementById('invoiceContent').innerHTML = `
                <!-- Invoice Header -->
                <div class="flex justify-between items-start border-b border-slate-200 pb-8 mb-8">
                    <div>
                        <div class="flex items-center gap-2 mb-3">
                            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-bold text-xl">E</div>
                            <span class="text-3xl font-black text-slate-900 tracking-tighter">ElectroHub</span>
                        </div>
                        <p class="text-sm text-slate-500">123 Đường Công Nghệ, Quận IT, TP.HCM</p>
                        <p class="text-sm text-slate-500">Hotline: 1900 6868</p>
                        <p class="text-sm text-slate-500">Email: support@electrohub.vn</p>
                    </div>
                    <div class="text-right">
                        <h1 class="text-4xl font-black text-slate-900 uppercase tracking-widest mb-2">Hóa đơn</h1>
                        <p class="text-sm font-bold text-slate-600">Mã đơn: <span class="text-blue-600">#ORD-${order.id}</span></p>
                        <p class="text-sm text-slate-500">Ngày lập: ${date}</p>
                    </div>
                </div>

                <!-- Customer Info -->
                <div class="mb-10">
                    <h3 class="text-xs font-bold uppercase tracking-widest text-slate-400 mb-4">Thông tin giao hàng</h3>
                    <div class="bg-slate-50 p-6 rounded-xl border border-slate-100">
                        <p class="font-bold text-lg text-slate-800 mb-1">${order.user_name || 'Khách hàng'}</p>
                        <p class="text-sm text-slate-600 mb-1"><span class="font-medium text-slate-400">SĐT:</span> ${order.user_phone || 'Không có'}</p>
                        <p class="text-sm text-slate-600 mb-1"><span class="font-medium text-slate-400">Email:</span> ${order.user_email || 'Không có'}</p>
                        <p class="text-sm text-slate-600"><span class="font-medium text-slate-400">Địa chỉ:</span> ${order.shipping_address || 'Không có'}</p>
                    </div>
                </div>

                <!-- Order Items -->
                <div class="mb-10 min-h-[300px]">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-slate-100 text-slate-600 text-sm uppercase tracking-wider">
                                <th class="py-4 px-4 rounded-l-xl text-center w-16">STT</th>
                                <th class="py-4 px-4 font-bold">Sản phẩm</th>
                                <th class="py-4 px-4 text-center w-24 font-bold">Số lượng</th>
                                <th class="py-4 px-4 text-right w-36 font-bold">Đơn giá</th>
                                <th class="py-4 px-4 rounded-r-xl text-right w-48 font-bold">Thành tiền</th>
                            </tr>
                        </thead>
                        <tbody>${itemsHtml}</tbody>
                    </table>
                </div>

                <!-- Summary -->
                <div class="flex justify-end mb-16">
                    <div class="w-80 space-y-4">
                        <div class="flex justify-between text-slate-600 text-sm">
                            <span>Tạm tính:</span>
                            <span class="font-medium">${formatVND(order.subtotal)}</span>
                        </div>
                        <div class="flex justify-between text-slate-600 text-sm">
                            <span>Phí vận chuyển:</span>
                            <span class="font-medium">${formatVND(order.shipping_cost)}</span>
                        </div>
                        ${order.discount > 0 ? `
                        <div class="flex justify-between text-green-600 text-sm font-medium">
                            <span>Mã giảm giá (Voucher):</span>
                            <span>-${formatVND(order.discount)}</span>
                        </div>` : ''}
                        <div class="pt-4 border-t border-slate-200 flex justify-between items-center">
                            <span class="font-bold text-slate-800 text-lg">Tổng cộng:</span>
                            <span class="text-3xl font-black text-blue-600">${formatVND(order.total_amount)}</span>
                        </div>
                    </div>
                </div>

                <!-- Footer -->
                <div class="border-t border-slate-200 text-center text-sm text-slate-500 pt-8">
                    <p class="font-bold text-slate-700 mb-1">Cảm ơn quý khách đã mua sắm tại ElectroHub!</p>
                    <p>Nếu có bất kỳ thắc mắc nào, vui lòng liên hệ với chúng tôi để được hỗ trợ kịp thời.</p>
                </div>
            `;
        }

        async function sendInvoiceEmail() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            if (!id) return;

            const btn = document.getElementById('btnSendEmail');
            btn.innerHTML = '<svg class="animate-spin h-5 w-5 mr-2 text-white inline" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Đang gửi...';
            btn.disabled = true;

            try {
                const user = AuthManager.getUser();
                const response = await fetch(`http://localhost:8888/api/admin/orders/${id}/send-invoice`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${user.token}` }
                });
                const result = await response.json();
                if (response.ok) { showToast(result.message, 'success'); } 
                else { showToast(result.message, 'error'); }
            } catch (err) {
                showToast('Lỗi mạng hoặc server không phản hồi.', 'error');
            } finally {
                btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-2 inline"><path d="M22 13V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v12c0 1.1.9 2 2 2h8"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/><path d="M19 16v6"/><path d="M16 19h6"/></svg> Gửi Email Hóa Đơn';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
