<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectroHub Admin - Quản lý Đánh giá</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-slate-50 min-h-screen flex">
    <!-- SIDEBAR -->
    <aside class="w-72 bg-white border-r border-slate-200 h-screen sticky top-0 flex flex-col">
        <div class="p-8 flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-100">
                <i data-lucide="layout-dashboard" size="24"></i>
            </div>
            <span class="text-2xl font-black text-slate-900 tracking-tighter">AdminHub</span>
        </div>
        <nav class="flex-1 px-4 space-y-2">
            <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 text-slate-500 hover:bg-slate-50 rounded-xl font-bold transition-all"><i data-lucide="bar-chart-3" size="20"></i> Tổng quan</a>
            <a href="products.html" class="flex items-center gap-3 px-4 py-3 text-slate-500 hover:bg-slate-50 rounded-xl font-bold transition-all"><i data-lucide="package" size="20"></i> Sản phẩm</a>
            <a href="orders.html" class="flex items-center gap-3 px-4 py-3 text-slate-500 hover:bg-slate-50 rounded-xl font-bold transition-all"><i data-lucide="shopping-bag" size="20"></i> Đơn hàng</a>
            <a href="customers.html" class="flex items-center gap-3 px-4 py-3 text-slate-500 hover:bg-slate-50 rounded-xl font-bold transition-all"><i data-lucide="users" size="20"></i> Khách hàng</a>
            <a href="vouchers.html" class="flex items-center gap-3 px-4 py-3 text-slate-500 hover:bg-slate-50 rounded-xl font-bold transition-all"><i data-lucide="ticket" size="20"></i> Mã giảm giá</a>
            <a href="reviews.html" class="flex items-center gap-3 px-4 py-3 bg-blue-50 text-blue-600 rounded-xl font-bold transition-all"><i data-lucide="star" size="20"></i> Đánh giá</a>
        </nav>
        <div class="p-6 border-t border-slate-100"><a href="../index.html" class="w-full flex items-center gap-3 px-4 py-3 text-red-500 hover:bg-red-50 rounded-xl font-bold transition-all"><i data-lucide="log-out" size="20"></i> Thoát Admin</a></div>
    </aside>
    
    <main class="flex-1 p-10 overflow-auto">
        <header class="flex items-center justify-between mb-10">
            <div>
                <h1 class="text-3xl font-black text-slate-900 tracking-tight">Kiểm duyệt Đánh giá</h1>
                <p class="text-slate-500 font-medium">Quản lý phản hồi của khách hàng về sản phẩm</p>
            </div>
            <div class="relative w-72">
                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size="18"></i>
                <input type="text" id="reviewSearch" placeholder="Tìm tên khách, sản phẩm..." class="w-full pl-12 pr-4 py-2.5 bg-white border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 text-sm font-medium transition-all">
            </div>
        </header>

        <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-slate-50/50">
                            <th class="px-8 py-4 text-xs font-bold text-slate-400 uppercase tracking-wider">Khách hàng</th>
                            <th class="px-8 py-4 text-xs font-bold text-slate-400 uppercase tracking-wider">Sản phẩm</th>
                            <th class="px-8 py-4 text-xs font-bold text-slate-400 uppercase tracking-wider">Đánh giá</th>
                            <th class="px-8 py-4 text-xs font-bold text-slate-400 uppercase tracking-wider text-right">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-50" id="reviewTableBody">
                        <tr><td colspan="4" class="text-center p-12 text-slate-500"><i data-lucide="loader-2" class="animate-spin mx-auto mb-2 text-blue-600"></i> Đang tải...</td></tr>
                    </tbody>
                </table>
            </div>
            <!-- Pagination -->
            <div class="p-6 border-t border-slate-100 flex items-center justify-between">
                <button id="prevPageBtn" class="px-4 py-2 text-sm font-bold text-slate-600 bg-slate-50 hover:bg-slate-100 rounded-lg transition-all border border-slate-200">Trang trước</button>
                <span id="pageInfo" class="text-sm font-bold text-slate-500">Trang 1 / 1</span>
                <button id="nextPageBtn" class="px-4 py-2 text-sm font-bold text-slate-600 bg-slate-50 hover:bg-slate-100 rounded-lg transition-all border border-slate-200">Trang sau</button>
            </div>
        </div>
    </main>

    <script src="../js/helpers.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (window.lucide) lucide.createIcons();
            fetchReviews();
            
            let searchTimeout;
            document.getElementById('reviewSearch').addEventListener('input', (e) => {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    currentPage = 1;
                    currentSearch = e.target.value;
                    fetchReviews();
                }, 500);
            });

            document.getElementById('prevPageBtn').addEventListener('click', () => { if (currentPage > 1) { currentPage--; fetchReviews(); } });
            document.getElementById('nextPageBtn').addEventListener('click', () => { if (currentPage < totalPages) { currentPage++; fetchReviews(); } });
        });

        let currentPage = 1;
        let totalPages = 1;
        let currentSearch = '';

        async function fetchReviews() {
            const user = AuthManager.getUser();
            const tableBody = document.getElementById('reviewTableBody');
            
            try {
                const url = `http://localhost:8888/api/admin/reviews?page=${currentPage}&limit=8&search=${encodeURIComponent(currentSearch)}`;
                const response = await fetch(url, { headers: { 'Authorization': `Bearer ${user.token}` } });
                const result = await response.json();
                
                if (response.ok) {
                    totalPages = result.data.total_pages || 1;
                    document.getElementById('pageInfo').innerText = `Trang ${currentPage} / ${totalPages}`;
                    document.getElementById('prevPageBtn').disabled = currentPage === 1;
                    document.getElementById('nextPageBtn').disabled = currentPage === totalPages || totalPages === 0;

                    if (!result.data.reviews || result.data.reviews.length === 0) {
                        tableBody.innerHTML = `<tr><td colspan="4" class="text-center p-12 text-slate-500">Không tìm thấy đánh giá nào.</td></tr>`;
                        return;
                    }
                    
                    tableBody.innerHTML = result.data.reviews.map(r => {
                        const date = new Date(r.created_at).toLocaleDateString('vi-VN');
                        const stars = Array(5).fill(0).map((_, i) => `<i data-lucide="star" ${i < r.rating ? 'fill="currentColor" class="text-orange-400"' : 'class="text-slate-200"'} size="14"></i>`).join('');
                        return `
                            <tr class="hover:bg-slate-50/50 transition-colors">
                                <td class="px-8 py-6">
                                    <p class="font-bold text-slate-900">${r.user_name}</p>
                                    <p class="text-xs text-slate-500">${date}</p>
                                </td>
                                <td class="px-8 py-6">
                                    <div class="flex items-center gap-3">
                                        <img src="${r.product_image}" class="w-10 h-10 rounded-lg object-cover border border-slate-200">
                                        <span class="font-medium text-slate-800 line-clamp-1 max-w-[200px]">${r.product_name}</span>
                                    </div>
                                </td>
                                <td class="px-8 py-6 max-w-sm">
                                    <div class="flex gap-1 mb-2">${stars}</div>
                                    <p class="text-sm text-slate-600 line-clamp-2">${r.comment}</p>
                                </td>
                                <td class="px-8 py-6 text-right">
                                    <button onclick="deleteReview(${r.id})" class="p-2 text-slate-400 hover:text-red-500 transition-all bg-white hover:bg-red-50 rounded-xl shadow-sm" title="Xóa đánh giá"><i data-lucide="trash-2" size="18"></i></button>
                                </td>
                            </tr>
                        `;
                    }).join('');
                    if(window.lucide) lucide.createIcons();
                }
            } catch (e) {
                tableBody.innerHTML = `<tr><td colspan="4" class="text-center p-12 text-red-500">Lỗi tải dữ liệu.</td></tr>`;
            }
        }

        async function deleteReview(id) {
            if (!confirm('Xác nhận xóa bài đánh giá này?')) return;
            try {
                const user = AuthManager.getUser();
                const res = await fetch(`http://localhost:8888/api/admin/reviews/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${user.token}` }
                });
                const result = await res.json();
                if (res.ok) {
                    showToast(result.message, 'success');
                    fetchReviews();
                } else { showToast(result.message, 'error'); }
            } catch (e) { showToast('Lỗi khi xóa', 'error'); }
        }
    </script>
</body>
</html>
